worker_processes 1;
events {
    worker_connections 1024;
}

# Modulo stream: balanceo TCP (capa 4) para MySQL
stream {
    log_format basic '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$upstream_addr" '
                     '"$upstream_bytes_sent" "$upstream_bytes_received" "$upstream_connect_time"';

    access_log /var/log/nginx/stream-access.log basic;
    error_log  /var/log/nginx/stream-error.log;

    # ---------- Pool de ESCRITURA (solo maestro) ----------
    upstream mysql_write {
        server db-source:3306 max_fails=3 fail_timeout=10s;
    }

    # ---------- Pool de LECTURA (esclavos balanceados) ----------
    # round-robin por defecto + health checks TCP pasivos
    # max_fails + fail_timeout = si un esclavo cae, NGINX lo saca del pool
    upstream mysql_read {
        server db-replica1:3306 max_fails=3 fail_timeout=10s;
        server db-replica2:3306 max_fails=3 fail_timeout=10s;
    }

    # Escritura -> maestro (puerto 3306 expuesto al host)
    server {
        listen 3306;
        proxy_pass mysql_write;
        proxy_connect_timeout 5s;
        proxy_timeout 60s;
    }

    # Lectura -> esclavos (puerto 3307 expuesto al host)
    server {
        listen 3307;
        proxy_pass mysql_read;
        proxy_connect_timeout 5s;
        proxy_timeout 60s;
        # health check pasivo: si una conexion falla, marca el nodo como caido
        proxy_next_upstream on;
    }
}
