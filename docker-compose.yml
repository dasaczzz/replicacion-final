services:
  certs-gen:
    image: alpine:3.20
    container_name: db-certs-gen
    volumes:
      - ./certs:/certs
      - ./generate-certs.sh:/generate-certs.sh:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        apk add --no-cache openssl >/dev/null
        sed 's/\r$//' /generate-certs.sh | sh

  source:
    image: mysql:8.0
    container_name: db-source
    hostname: db-source
    command:
      - --server-id=1
      - --bind-address=0.0.0.0
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-replica-updates=ON
      - --ssl-ca=/etc/mysql/certs/ca.pem
      - --ssl-cert=/etc/mysql/certs/server-cert.pem
      - --ssl-key=/etc/mysql/certs/server-key.pem
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: replicacion
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./init-user.sh:/scripts-raw/init-user.sh:ro
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./data.sql:/docker-entrypoint-initdb.d/02-data.sql
      - ./certs:/etc/mysql/certs
      - source-data:/var/lib/mysql
    entrypoint:
      - bash
      - -c
      - |
        sed 's/\r$//' /scripts-raw/init-user.sh > /docker-entrypoint-initdb.d/00-init-user.sh
        chmod +x /docker-entrypoint-initdb.d/00-init-user.sh
        exec docker-entrypoint.sh mysqld "$@"
      - bash
    depends_on:
      certs-gen:
        condition: service_completed_successfully
    networks:
      - db-network

  replica1:
    image: mysql:8.0
    container_name: db-replica1
    hostname: db-replica1
    command:
      - --server-id=2
      - --bind-address=0.0.0.0
      - --log-bin=mysql-bin
      - --relay-log=mysql-relay-bin
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-replica-updates=ON
      - --read-only=ON
      - --replicate-ignore-db=mysql
      - --ssl-ca=/etc/mysql/certs/ca.pem
      - --ssl-cert=/etc/mysql/certs/client-cert.pem
      - --ssl-key=/etc/mysql/certs/client-key.pem
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./init-replica.sh:/scripts-raw/init-replica.sh:ro
      - ./certs:/etc/mysql/certs
      - replica1-data:/var/lib/mysql
    entrypoint:
      - bash
      - -c
      - |
        sed 's/\r$//' /scripts-raw/init-replica.sh > /docker-entrypoint-initdb.d/init-replica.sh
        chmod +x /docker-entrypoint-initdb.d/init-replica.sh
        exec docker-entrypoint.sh mysqld "$@"
      - bash
    depends_on:
      certs-gen:
        condition: service_completed_successfully
      source:
        condition: service_started
    networks:
      - db-network

  replica2:
    image: mysql:8.0
    container_name: db-replica2
    hostname: db-replica2
    command:
      - --server-id=3
      - --bind-address=0.0.0.0
      - --log-bin=mysql-bin
      - --relay-log=mysql-relay-bin
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-replica-updates=ON
      - --read-only=ON
      - --replicate-ignore-db=mysql
      - --ssl-ca=/etc/mysql/certs/ca.pem
      - --ssl-cert=/etc/mysql/certs/client-cert.pem
      - --ssl-key=/etc/mysql/certs/client-key.pem
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./init-replica.sh:/scripts-raw/init-replica.sh:ro
      - ./certs:/etc/mysql/certs
      - replica2-data:/var/lib/mysql
    entrypoint:
      - bash
      - -c
      - |
        sed 's/\r$//' /scripts-raw/init-replica.sh > /docker-entrypoint-initdb.d/init-replica.sh
        chmod +x /docker-entrypoint-initdb.d/init-replica.sh
        exec docker-entrypoint.sh mysqld "$@"
      - bash
    depends_on:
      certs-gen:
        condition: service_completed_successfully
      source:
        condition: service_started
    networks:
      - db-network

  nginx:
    image: nginx:1.27
    container_name: db-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "3306:3306" # escritura -> maestro
      - "3307:3307" # lectura  -> esclavos (balanceado)
    depends_on:
      - source
      - replica1
      - replica2
    networks:
      - db-network

  sysbench:
    image: severalnines/sysbench:latest
    container_name: db-sysbench
    depends_on:
      - nginx
    volumes:
      - ./sysbench:/scripts-raw:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /scripts
        for f in /scripts-raw/*.sh; do
          name=$$(basename "$$f")
          sed 's/\r$$//' "$$f" > "/scripts/$$name"
          chmod +x "/scripts/$$name"
        done
        cd /scripts
        exec sleep infinity
    networks:
      - db-network

  web:
    image: httpd:2.4
    container_name: db-web
    ports:
      - "8080:80"
    volumes:
      - ./web:/usr/local/apache2/htdocs/:ro
    networks:
      - db-network

  api:
    build: ./api
    container_name: db-api
    ports:
      - "5001:5000"
    environment:
      DB_HOST_WRITE: db-nginx
      DB_HOST_READ: db-nginx
      DB_PORT_WRITE: 3306
      DB_PORT_READ: 3307
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      DB_NAME: replicacion
    depends_on:
      - nginx
    volumes:
      - ./sysbench:/scripts-raw:ro
    entrypoint:
      - bash
      - -c
      - |
        mkdir -p /scripts
        for f in /scripts-raw/*.sh; do
          name=$$(basename "$$f")
          sed 's/\r$$//' "$$f" > "/scripts/$$name"
          chmod +x "/scripts/$$name"
        done
        python app.py
    networks:
      - db-network

networks:
  db-network:
    driver: bridge

volumes:
  source-data:
  replica1-data:
  replica2-data:
